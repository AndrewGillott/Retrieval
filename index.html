<div class="app">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">

      <div class="subtitle">AQA GCSE Combined Science · Evidence-based retrieval practice</div>
    </div>
  </div>

  <div class="card">
    <div class="tab-row">
      <button class="tab on" id="tb-build" onclick="showTab('build')">Quiz builder</button>
      <button class="tab" id="tb-history" onclick="showTab('history')">Class history</button>
      <button class="tab" id="tb-review" onclick="showTab('review')">Needs review</button>
    </div>

    <div id="pane-build">
      <div class="slabel">Class</div>
      <div class="row" style="margin-bottom:14px">
        <select id="cls-sel" onchange="switchClass()" style="width:170px"></select>
        <input type="text" id="cls-new" placeholder="New class name…" style="width:150px">
        <button class="btn btn-sm" onclick="addClass()">+ Add</button>
      </div>

      <div class="slabel">Add spec points covered</div>
      <div class="topic-panel">
        <div class="subj-tabs">
          <button class="subj-tab on" onclick="switchSubj('bio',this)">Biology</button>
          <button class="subj-tab" onclick="switchSubj('chem',this)">Chemistry</button>
          <button class="subj-tab" onclick="switchSubj('phys',this)">Physics</button>
        </div>
        <div style="padding:8px 8px 0">
          <input type="search" id="topic-search" placeholder="Search spec points…" oninput="renderTopicList()">
        </div>
        <div class="topic-list" id="topic-list"></div>
      </div>

      <div class="slabel" style="margin-top:4px">Spec points added <span id="topics-count" style="font-weight:400;color:#aaa"></span></div>
      <div class="tags-wrap" id="tags-wrap"><span class="empty">No spec points added yet</span></div>

      <div class="divider"></div>
      <div class="slabel">Quiz settings</div>
      <div class="row" style="margin-bottom:14px;gap:14px">
        <div><div style="font-size:12px;color:#666;margin-bottom:4px">Tier</div>
          <select id="tier" style="width:130px"><option>Foundation</option><option selected>Higher</option></select></div>
        <div><div style="font-size:12px;color:#666;margin-bottom:4px">Total questions</div>
          <input type="number" id="q-total" value="5" min="1" max="20" style="width:74px"></div>
        <div><div style="font-size:12px;color:#666;margin-bottom:4px">Of which MC</div>
          <input type="number" id="q-mc" value="2" min="0" max="10" style="width:74px"></div>
        <div><div style="font-size:12px;color:#666;margin-bottom:4px">Include flagged</div>
          <select id="inc-flag" style="width:90px"><option value="1">Yes</option><option value="0">No</option></select></div>
      </div>

      <button class="btn btn-primary" id="gen-btn" onclick="generate()">&#9654; Generate quiz</button>
      <div id="gen-err"></div>
    </div>

    <div id="pane-history" style="display:none"><div id="hist-body"><span class="empty">Select a class to see history.</span></div></div>
    <div id="pane-review" style="display:none"><div id="rev-body"><span class="empty">No questions flagged yet.</span></div></div>
  </div>

  <div id="quiz-out"></div>
</div>

let curSubj='bio';
let S={classes:{},cur:null,topics:[],quiz:[],lastSettings:{}};
try{const r=localStorage.getItem('aqaqz_v6');if(r)S=JSON.parse(r);}catch(e){}
function save(){try{localStorage.setItem('aqaqz_v6',JSON.stringify(S));}catch(e){}}
function subjOf(id){return id.startsWith('4')?'bio':id.startsWith('5')?'chem':'phys';}

function boot(){renderTopicList();renderClsSel();renderTags();renderHist();renderRev();}

function switchSubj(subj,el){
  curSubj=subj;
  document.querySelectorAll('.subj-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('topic-search').value='';
  renderTopicList();
}

function renderTopicList(){
  const q=(document.getElementById('topic-search').value||'').toLowerCase();
  const list=document.getElementById('topic-list');
  const items=TOPICS[curSubj].filter(t=>!q||t.text.toLowerCase().includes(q));
  if(!items.length){list.innerHTML='<div class="no-results">No spec points match your search</div>';return;}
  list.innerHTML=items.map(t=>{
    const added=S.topics.includes(t.id);
    return `<div class="topic-item${added?' added':''}">
      <span>${t.text}</span>
      <button class="add-btn" onclick="addTopic('${t.id}')" ${added?'disabled':''}>+ Add</button>
    </div>`;
  }).join('');
}

function addTopic(id){
  if(S.topics.includes(id))return;
  S.topics.push(id);
  if(S.cur&&S.classes[S.cur]){S.classes[S.cur].topics=S.topics;save();}
  renderTags();renderTopicList();
}

function removeTopic(id){
  S.topics=S.topics.filter(x=>x!==id);
  if(S.cur&&S.classes[S.cur]){S.classes[S.cur].topics=S.topics;save();}
  renderTags();renderTopicList();
}

function getTopicText(id){
  for(const subj of Object.values(TOPICS)){
    const found=subj.find(t=>t.id===id);
    if(found)return found.text;
  }
  return id;
}

function renderTags(){
  const w=document.getElementById('tags-wrap');
  const cnt=document.getElementById('topics-count');
  cnt.textContent=S.topics.length?`(${S.topics.length})`:'';
  if(!S.topics.length){w.innerHTML='<span class="empty">No spec points added yet</span>';return;}
  w.innerHTML=S.topics.map(id=>`<span class="tag ${subjOf(id)}">${getTopicText(id)} <span style="cursor:pointer;margin-left:2px" onclick="removeTopic('${id}')">×</span></span>`).join('');
}

function renderClsSel(){
  const sel=document.getElementById('cls-sel');
  const cls=Object.keys(S.classes);
  sel.innerHTML='<option value="">— select class —</option>'+cls.map(c=>`<option${S.cur===c?' selected':''}>${c}</option>`).join('');
}

function addClass(){
  const inp=document.getElementById('cls-new');
  const n=inp.value.trim();if(!n)return;
  if(!S.classes[n])S.classes[n]={topics:[],history:[],flagged:[]};
  inp.value='';S.cur=n;S.topics=[...S.classes[n].topics];
  renderClsSel();renderTags();renderTopicList();save();
}

function switchClass(){
  S.cur=document.getElementById('cls-sel').value||null;
  S.topics=S.cur&&S.classes[S.cur]?[...S.classes[S.cur].topics]:[];
  renderTags();renderTopicList();renderHist();renderRev();
}

function renderHist(){
  const el=document.getElementById('hist-body');
  if(!S.cur||!S.classes[S.cur]){el.innerHTML='<span class="empty">Select a class to see history.</span>';return;}
  const h=S.classes[S.cur].history||[];
  if(!h.length){el.innerHTML=`<span class="empty">No quizzes run yet for ${S.cur}.</span>`;return;}
  el.innerHTML=h.slice().reverse().map(r=>`
    <div class="q-block" style="font-size:13px">
      <div style="color:#888;font-size:11px;margin-bottom:3px">${new Date(r.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
      <div style="font-weight:500">${r.n} questions · ${r.tier} tier</div>
      ${r.low&&r.low.length?`<div style="margin-top:5px;display:flex;gap:4px;flex-wrap:wrap">${r.low.map(q=>`<span class="badge badge-low">⚑ ${q}</span>`).join('')}</div>`:''}
    </div>`).join('');
}

function renderRev(){
  const el=document.getElementById('rev-body');
  if(!S.cur||!S.classes[S.cur]){el.innerHTML='<span class="empty">Select a class.</span>';return;}
  const fl=S.classes[S.cur].flagged||[];
  if(!fl.length){el.innerHTML='<span class="empty">No questions flagged for review yet.</span>';return;}
  el.innerHTML=fl.map((f,i)=>`
    <div class="q-block">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div>
          <div style="font-size:11px;color:#888;margin-bottom:3px">${f.topic} · ${new Date(f.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
          <div style="font-size:13px;margin-bottom:5px">${f.q}</div>
          <span class="badge badge-low">${f.pct}% correct</span>
        </div>
        <button class="btn btn-sm" onclick="dismissFlag(${i})">Dismiss</button>
      </div>
    </div>`).join('');
}

function dismissFlag(i){
  if(S.cur&&S.classes[S.cur]){S.classes[S.cur].flagged.splice(i,1);save();renderRev();}
}

function showTab(t){
  ['build','history','review'].forEach(x=>{
    document.getElementById('pane-'+x).style.display=x===t?'block':'none';
    document.getElementById('tb-'+x).classList.toggle('on',x===t);
  });
  if(t==='history')renderHist();
  if(t==='review')renderRev();
}

async function generate(){
  if(!S.topics.length){alert('Add at least one spec point first.');return;}
  const btn=document.getElementById('gen-btn');
  btn.innerHTML='<span class="spinner"></span> Generating…';
  btn.disabled=true;
  document.getElementById('gen-err').innerHTML='';

  const tier=document.getElementById('tier').value;
  const total=Math.max(1,parseInt(document.getElementById('q-total').value)||5);
  const mc=Math.min(parseInt(document.getElementById('q-mc').value)||0,total);
  const incFlag=document.getElementById('inc-flag').value==='1';
  S.lastSettings={tier,total,mc,cls:S.cur};save();

  const flagged=incFlag&&S.cur&&S.classes[S.cur]?(S.classes[S.cur].flagged||[]).slice(0,3):[];
  const topicObjs=S.topics.map(id=>({id,text:getTopicText(id)}));

  try{
    const resp=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({topics:topicObjs,tier,total,mc,flagged})
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error||`HTTP ${resp.status}`);}
    const data=await resp.json();
    S.quiz=data.questions||[];
    if(!S.quiz.length)throw new Error('No questions returned');
    if(S.cur&&S.classes[S.cur]){
      S.classes[S.cur].history=S.classes[S.cur].history||[];
      S.classes[S.cur].history.push({date:new Date().toISOString(),tier,n:S.quiz.length,low:[]});
      save();
    }
    renderQuiz();
  }catch(e){
    document.getElementById('gen-err').innerHTML=`<div class="err">Error: ${e.message}</div>`;
  }
  btn.innerHTML='&#9654; Generate quiz';
  btn.disabled=false;
}

function renderQuiz(){
  const out=document.getElementById('quiz-out');
  const ls=S.lastSettings||{};
  out.innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:15px;font-weight:500">Today's quiz ${ls.cls?`<span class="badge badge-blue" style="margin-left:6px">${ls.cls}</span>`:''} <span class="badge" style="background:#f0f0f0;color:#666;margin-left:4px">${ls.tier||''}</span></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-copy" onclick="copyForDoc()">&#128203; Copy for document</button>
        <button class="btn btn-sm" onclick="saveResults()">&#128190; Save results</button>
      </div>
    </div>
    ${S.quiz.map((q,i)=>qHtml(q,i)).join('')}
  </div>`;
}

function qHtml(q,i){
  const isMC=q.type==='mc';
  const specRef=q.spec_id?`<span style="font-family:monospace;background:#f0f0f0;padding:1px 5px;border-radius:4px;margin-left:4px">${q.spec_id}</span>`:'';
  return `<div class="q-block" id="qb-${i}">
    <div class="q-meta">Q${i+1} · ${q.topic||''} ${specRef} · ${isMC?'multiple choice':'short answer'}</div>
    <div class="q-text">${q.question}</div>
    ${isMC?`<div class="mc-options" id="mc-${i}">${(q.options||[]).map((o,j)=>`<div class="mc-opt" onclick="pickMC(${i},${j},'${(q.answer||'').replace(/'/g,"\\'")}' )">${o}</div>`).join('')}</div>`
    :`<button class="btn btn-sm" onclick="showAns(${i})">Show model answer</button>`}
    <div class="ans-box" id="ans-${i}"><div class="ans-lbl">Model answer (AQA spec · ${q.spec_id||''})</div><div style="font-size:13px;line-height:1.5">${q.model_answer||''}</div></div>
    <div class="pct-row">
      % correct:
      <input type="number" class="pct-input" id="pct-${i}" min="0" max="100" placeholder="%"
        oninput="checkPct(${i},'${(q.question||'').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ')}','${(q.topic||'').replace(/'/g,"\\'")}')">
      <span id="pctb-${i}"></span>
    </div>
  </div>`;
}

function pickMC(qi,optIdx,correct){
  const letters=['A','B','C','D'];
  document.querySelectorAll(`#mc-${qi} .mc-opt`).forEach((o,j)=>{
    o.classList.remove('correct','wrong');
    if(letters[j]===correct)o.classList.add('correct');
    else if(j===optIdx)o.classList.add('wrong');
  });
  showAns(qi);
}

function showAns(i){document.getElementById('ans-'+i).classList.add('show');}

function checkPct(i,question,topic){
  const v=parseInt(document.getElementById('pct-'+i).value);
  const b=document.getElementById('pctb-'+i);
  if(isNaN(v)){b.innerHTML='';return;}
  b.innerHTML=v<60?'<span class="badge badge-low">⚑ Flag for review</span>':'<span class="badge badge-ok">✓ Good</span>';
}

function copyForDoc(){
  const ls=S.lastSettings||{};
  const date=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  let out=`AQA GCSE Combined Science — Retrieval Quiz\n`;
  out+=`${ls.cls?`Class: ${ls.cls}  |  `:''}${ls.tier||''} Tier  |  ${date}\n`;
  out+=`${'─'.repeat(60)}\n\n`;
  S.quiz.forEach((q,i)=>{
    out+=`Q${i+1}. [${q.topic}${q.spec_id?' · '+q.spec_id:''}]\n${q.question}\n`;
    if(q.type==='mc'&&q.options){q.options.forEach(o=>out+=`   ${o}\n`);}
    out+=`\n`;
  });
  out+=`${'─'.repeat(60)}\nMODEL ANSWERS\n${'─'.repeat(60)}\n\n`;
  S.quiz.forEach((q,i)=>{out+=`Q${i+1}. ${q.model_answer}\n\n`;});
  navigator.clipboard.writeText(out).then(()=>alert('Copied! Paste into Word or Google Docs.')).catch(()=>alert('Copy failed.'));
}

function saveResults(){
  const ls=S.lastSettings||{};
  if(!ls.cls||!S.classes[ls.cls]){alert('No class selected.');return;}
  const cl=S.classes[ls.cls];
  cl.flagged=cl.flagged||[];
  const hist=cl.history;const latest=hist&&hist[hist.length-1];
  S.quiz.forEach((q,i)=>{
    const v=parseInt(document.getElementById('pct-'+i).value);
    if(!isNaN(v)&&v<60){
      cl.flagged.push({q:q.question,topic:q.topic,pct:v,date:new Date().toISOString()});
      if(latest){latest.low=latest.low||[];latest.low.push(q.topic);}
    }
  });
  save();
  alert('Saved! Low-scoring questions flagged for review.');
  renderRev();
}

boot();
</script>
